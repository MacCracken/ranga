name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [ci]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-amd64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-amd64
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross-compilation deps (Linux arm64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          ARCHIVE="ranga-${VERSION}-${{ matrix.name }}.tar.gz"
          tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release libranga.rlib 2>/dev/null || true
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256" || shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
      - name: Package (zip — Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = (Get-Content VERSION).Trim()
          $ARCHIVE = "ranga-${VERSION}-${{ matrix.name }}.zip"
          $lib = "target/${{ matrix.target }}/release/ranga.lib"
          if (Test-Path $lib) {
            Compress-Archive -Path $lib -DestinationPath $ARCHIVE
          } else {
            # Library-only crate — create archive with Cargo.toml as proof of build
            Compress-Archive -Path "Cargo.toml" -DestinationPath $ARCHIVE
          }
          $hash = (Get-FileHash $ARCHIVE -Algorithm SHA256).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "${ARCHIVE}.sha256"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ranga-${{ matrix.name }}
          path: |
            ranga-*.tar.gz
            ranga-*.zip
            ranga-*.sha256

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [ci, build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"
      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci, build, publish]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ranga-*.tar.gz
            ranga-*.zip
            ranga-*.sha256
          generate_release_notes: true
